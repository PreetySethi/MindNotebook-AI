<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindMap - NotebookLM for Mental Therapy</title>
    <!-- React and Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Custom styling to guarantee premium fonts and transitions -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .font-serif {
            font-family: 'Instrument Serif', serif;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 selection:bg-teal-100 selection:text-teal-950">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CUSTOM INLINE SVG ICONS (Ensures 100% reliability with no dependencies) ---
        const DashboardIcon = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
                <rect x="3" y="3" width="7" height="9" rx="1" />
                <rect x="14" y="3" width="7" height="5" rx="1" />
                <rect x="14" y="12" width="7" height="9" rx="1" />
                <rect x="3" y="16" width="7" height="5" rx="1" />
            </svg>
        );

        const JournalIcon = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 6.042A8.967 8.967 0 0 0 6 3.75c-1.052 0-2.062.18-3 .512v14.25A8.987 8.987 0 0 1 6 18c2.305 0 4.408.867 6 2.292m0-14.25a8.966 8.966 0 0 1 6-2.292c1.052 0 2.062.18 3 .512v14.25A8.987 8.987 0 0 0 18 18a8.967 8.967 0 0 0-6 2.292m0-14.25v14.25" />
            </svg>
        );

        const MoodIcon = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M15.182 15.182a4.5 4.5 0 0 1-6.364 0M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0ZM9.75 9.75c0 .414-.168.75-.375.75S9 10.164 9 9.75 9.168 9 9.375 9s.375.336.375.75Zm-.375 0h.008v.015h-.008V9.75Zm5.625 0c0 .414-.168.75-.375.75s-.375-.336-.375-.75.168-.75.375-.75.375.336.375.75Zm-.375 0h.008v.015h-.008V9.75Z" />
            </svg>
        );

        const DocsIcon = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m0 12.75h7.5m-7.5 3H12M10.5 2.25H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" />
            </svg>
        );

        const ChatIcon = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M20.25 8.511c.084.29.125.597.125.913 0 3.73-4.03 6.75-9 6.75a11.947 11.947 0 0 1-1.995-.168l-4.116 2.385c-.94.545-2.096-.135-2.096-1.229V15.74C2.193 14.3 1.5 12.24 1.5 10c0-4.142 4.03-7.5 9-7.5 4.666 0 8.52 3.1 8.943 7.011ZM16.25 5.511a9.018 9.018 0 0 0-4.116-2.385l-4.116 2.385V10c0 .907-.156 1.777-.442 2.583" />
            </svg>
        );

        const FlameIcon = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M15.362 5.214A8.252 8.252 0 0 1 12 21 8.25 8.25 0 0 1 6.038 7.047 8.287 8.287 0 0 0 9 9.601a8.983 8.983 0 0 1 3.361-6.867 8.21 8.21 0 0 0 3 2.48Z" />
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 18a3.75 3.75 0 0 0 .495-7.467 5.99 5.99 0 0 0-1.925 3.546 5.974 5.974 0 0 1-2.133-1A3.75 3.75 0 0 0 12 18Z" />
            </svg>
        );

        const SparklesIcon = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M9.813 15.904L9 21l-.813-5.096L3 15l5.187-.813L9 9l.813 5.187L15 15l-5.187.813ZM18.25 5.25L17.5 9l-.75-3.75L13 4.5l3.75-.75L17.5 1l.75 3.75L22 4.5l-3.75.75Z" />
            </svg>
        );

        const TrashIcon = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
            </svg>
        );

        const PlusIcon = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M12 4.5v15m7.5-7.5h-15" />
            </svg>
        );

        const UploadIcon = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5" />
            </svg>
        );

        const BrainIcon = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2" stroke="currentColor" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M9.5 2A2.5 2.5 0 0 0 7 4.5v15a2.5 2.5 0 0 0 5 0V4.5A2.5 2.5 0 0 0 9.5 2Z" />
                <path strokeLinecap="round" strokeLinejoin="round" d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 5 0V4.5A2.5 2.5 0 0 0 14.5 2Z" />
                <path strokeLinecap="round" strokeLinejoin="round" d="M2.5 8A2.5 2.5 0 0 0 5 10.5v3a2.5 2.5 0 0 0 5 0v-3A2.5 2.5 0 0 0 7.5 8h-5Z" />
                <path strokeLinecap="round" strokeLinejoin="round" d="M21.5 8A2.5 2.5 0 0 0 19 10.5v3a2.5 2.5 0 0 0 5 0v-3A2.5 2.5 0 0 0 21.5 8h-5Z" />
            </svg>
        );

        const SendIcon = ({ className = "w-5 h-5" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth="2.5" stroke="currentColor" className={className}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M6 12 3.269 3.125A59.769 59.769 0 0 1 21.485 12 59.768 59.768 0 0 1 3.27 20.875L5.999 12Zm0 0h7.5" />
            </svg>
        );

        // --- Custom Local Storage hook ---
        function useLocalStorage(key, initialValue) {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    return item ? JSON.parse(item) : initialValue;
                } catch (error) {
                    return initialValue;
                }
            });
            useEffect(() => {
                try {
                    window.localStorage.setItem(key, JSON.stringify(storedValue));
                } catch (error) {
                    console.error(error);
                }
            }, [key, storedValue]);
            return [storedValue, setStoredValue];
        }

        // --- NavItem Component ---
        function NavItem({ Icon, label, active, onClick }) {
            return (
                <button
                    onClick={onClick}
                    className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200
                        ${active 
                            ? 'bg-teal-50 text-teal-800 font-semibold shadow-sm' 
                            : 'text-slate-500 hover:bg-slate-50 hover:text-slate-800'
                        }
                    `}
                >
                    <Icon className={active ? 'text-teal-600 w-5 h-5' : 'text-slate-400 w-5 h-5'} />
                    <span className="text-sm">{label}</span>
                </button>
            );
        }

        // --- Sub-view Components (Properly structured to avoid Hook violations) ---

        // 1. DASHBOARD VIEW COMPONENT
        function DashboardTab({ journalEntries, moods, documents, streak, setActiveTab, setPreviewDoc }) {
            const recentJournals = journalEntries.slice(0, 3);
            const recentDocs = documents.slice(0, 3);
            
            const getGroundedInsights = () => {
                if (journalEntries.length === 0 && documents.length === 0) {
                    return "Your mindmap notebook is ready. Try uploading a CBT worksheet or writing your first journal entry to generate mental health insights.";
                }
                
                const anxietyKeywordCount = journalEntries.filter(j => j.text.toLowerCase().includes('anxious') || j.text.toLowerCase().includes('anxiety')).length;
                const primaryMood = moods.length > 0 ? moods[0].label : "untracked yet";

                return `Based on your recent ${journalEntries.length} journals and ${documents.length} sources: Your last recorded mood was "${primaryMood}". We detected themes of self-reflection and ${anxietyKeywordCount > 0 ? 'anxious tension' : 'general emotional progression'}. Refer to your uploaded "${documents[0]?.name || 'worksheets'}" in the Therapy tab for specialized guidance on managing these vibes.`;
            };

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="bg-gradient-to-r from-teal-900 via-teal-800 to-emerald-950 p-8 rounded-3xl text-white shadow-xl relative overflow-hidden">
                        <div className="absolute right-0 top-0 translate-x-12 -translate-y-12 opacity-10 pointer-events-none">
                            <BrainIcon className="w-80 h-80" />
                        </div>
                        <span className="bg-teal-700/50 backdrop-blur-sm text-teal-200 text-xs px-3 py-1.5 rounded-full font-semibold tracking-wider uppercase">
                            Grounded Notebook Guide
                        </span>
                        <h2 className="text-4xl font-serif mt-4 font-normal">Welcome to your MindMap</h2>
                        <p className="text-teal-100/80 mt-2 max-w-xl leading-relaxed text-sm">
                            A clinical-grade mental wellness space that learns from your writing and therapeutic guides to build personalized coping plans.
                        </p>
                        <div className="mt-6 border-t border-teal-700/50 pt-4">
                            <p className="text-xs text-teal-300 font-medium tracking-wider uppercase flex items-center">
                                <SparklesIcon className="w-4 h-4 mr-1.5 text-yellow-300" /> Synthesized Synthesis of Mind
                            </p>
                            <p className="text-sm text-teal-50/90 mt-1 italic font-light leading-relaxed">
                                "{getGroundedInsights()}"
                            </p>
                        </div>
                    </div>

                    {/* Stats Widgets */}
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-5">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center space-x-4">
                            <div className="p-3 bg-amber-50 rounded-xl text-amber-600">
                                <FlameIcon className="w-8 h-8" />
                            </div>
                            <div>
                                <p className="text-xs text-slate-400 font-semibold tracking-wide uppercase">Streak</p>
                                <p className="text-2xl font-bold text-slate-800">{streak} Days</p>
                            </div>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center space-x-4">
                            <div className="p-3 bg-teal-50 rounded-xl text-teal-600">
                                <JournalIcon className="w-8 h-8" />
                            </div>
                            <div>
                                <p className="text-xs text-slate-400 font-semibold tracking-wide uppercase">Journals</p>
                                <p className="text-2xl font-bold text-slate-800">{journalEntries.length} Entries</p>
                            </div>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 flex items-center space-x-4">
                            <div className="p-3 bg-indigo-50 rounded-xl text-indigo-600">
                                <DocsIcon className="w-8 h-8" />
                            </div>
                            <div>
                                <p className="text-xs text-slate-400 font-semibold tracking-wide uppercase">Grounded Sources</p>
                                <p className="text-2xl font-bold text-slate-800">{documents.length} Files</p>
                            </div>
                        </div>
                    </div>

                    {/* Recent Items split screen */}
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        {/* Recent Journals */}
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <h3 className="text-md font-bold text-slate-800 mb-4 flex items-center">
                                <JournalIcon className="mr-2 text-teal-600 w-5 h-5" /> Recent Journal Entries
                            </h3>
                            {recentJournals.length === 0 ? (
                                <p className="text-slate-400 text-sm italic">No entries logged yet. Head over to the Journal tab.</p>
                            ) : (
                                <div className="space-y-3">
                                    {recentJournals.map(entry => (
                                        <div key={entry.id} className="p-3 bg-slate-50 rounded-xl hover:bg-slate-100/80 transition-all">
                                            <div className="flex justify-between items-center mb-1">
                                                <span className="text-xs text-slate-400">{new Date(entry.date).toLocaleDateString()}</span>
                                                <span className="text-xs bg-teal-100 text-teal-800 px-2 py-0.5 rounded-full font-medium">{entry.mood}</span>
                                            </div>
                                            <p className="text-slate-700 text-sm line-clamp-2">{entry.text}</p>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>

                        {/* Active Knowledge base */}
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                            <h3 className="text-md font-bold text-slate-800 mb-4 flex items-center">
                                <DocsIcon className="mr-2 text-indigo-600 w-5 h-5" /> Grounded Sources
                            </h3>
                            {recentDocs.length === 0 ? (
                                <p className="text-slate-400 text-sm italic">No documents uploaded. Keep track of PDFs/worksheets here.</p>
                            ) : (
                                <div className="space-y-3">
                                    {recentDocs.map(doc => (
                                        <div key={doc.id} className="p-3 bg-slate-50 rounded-xl flex justify-between items-center hover:bg-slate-100/80 transition-all cursor-pointer" onClick={() => { setPreviewDoc(doc); setActiveTab('documents'); }}>
                                            <div className="flex items-center space-x-2">
                                                <div className="w-2 h-2 rounded-full bg-emerald-500"></div>
                                                <div>
                                                    <p className="text-sm font-semibold text-slate-800 max-w-[180px] truncate">{doc.name}</p>
                                                    <p className="text-xs text-slate-400">{doc.category || 'General'}</p>
                                                </div>
                                            </div>
                                            <span className="text-xs text-teal-600 bg-teal-50 px-2.5 py-1 rounded-lg border border-teal-100 font-semibold">Active Source</span>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // 2. JOURNAL VIEW COMPONENT
        function JournalTab({ journalEntries, setJournalEntries, moods, setMoods, deleteJournal }) {
            const [text, setText] = useState("");
            const [selectedMood, setSelectedMood] = useState("Good");

            const handleSave = () => {
                if (!text.trim()) return;
                const newEntry = {
                    id: Date.now(),
                    text,
                    mood: selectedMood,
                    date: new Date().toISOString()
                };
                setJournalEntries([newEntry, ...journalEntries]);
                
                // Automatically append to mood tracker logs as well
                const moodEmojiMap = { "Awful": "😭", "Bad": "😔", "Okay": "😐", "Good": "🙂", "Great": "🤩" };
                setMoods([{ id: Date.now(), emoji: moodEmojiMap[selectedMood] || "😐", label: selectedMood, date: new Date().toISOString() }, ...moods]);
                
                setText("");
            };

            return (
                <div className="space-y-6 animate-fade-in">
                    <div className="flex justify-between items-center">
                        <div>
                            <h2 className="text-3xl font-serif text-teal-950">Mental Journal</h2>
                            <p className="text-sm text-slate-500">Document your stream of consciousness to ground your counseling guide.</p>
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 space-y-4">
                        <textarea
                            value={text}
                            onChange={(e) => setText(e.target.value)}
                            placeholder="Write down how you feel today. What thoughts are repeating? Describe any physical feelings of stress..."
                            className="w-full h-40 p-4 bg-slate-50 rounded-xl focus:ring-2 focus:ring-teal-500/20 focus:bg-white outline-none border border-slate-200 transition-all text-sm leading-relaxed text-slate-700"
                        />
                        
                        <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 pt-2 border-t border-slate-100">
                            <div className="flex items-center space-x-2 flex-wrap gap-y-2">
                                <span className="text-xs font-semibold text-slate-500 uppercase tracking-wide">Select Entry Mood:</span>
                                <div className="flex space-x-1.5 flex-wrap gap-y-1">
                                    {["Awful", "Bad", "Okay", "Good", "Great"].map(m => (
                                        <button 
                                            key={m} 
                                            type="button" 
                                            onClick={() => setSelectedMood(m)}
                                            className={`px-3 py-1 rounded-lg text-xs font-medium transition-all ${
                                                selectedMood === m 
                                                    ? 'bg-teal-600 text-white shadow-sm' 
                                                    : 'bg-slate-100 hover:bg-slate-200 text-slate-600'
                                            }`}
                                        >
                                            {m}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            <button 
                                onClick={handleSave}
                                disabled={!text.trim()}
                                className="bg-teal-700 hover:bg-teal-800 disabled:opacity-50 text-white px-5 py-2.5 rounded-xl font-medium text-sm flex items-center justify-center space-x-1.5 transition-all shadow-sm shrink-0"
                            >
                                <PlusIcon className="w-4 h-4" />
                                <span>Add to Notebook</span>
                            </button>
                        </div>
                    </div>

                    {/* Past entries timeline */}
                    <div className="space-y-4">
                        <h3 className="text-lg font-bold text-slate-800">Your Journal Timeline</h3>
                        {journalEntries.length === 0 ? (
                            <p className="text-slate-400 text-sm italic">No entries yet. Write your thoughts above to start tracking.</p>
                        ) : (
                            <div className="space-y-4">
                                {journalEntries.map(entry => (
                                    <div key={entry.id} className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 relative group hover:border-teal-200 transition-all">
                                        <div className="flex justify-between items-center mb-3 flex-wrap gap-2">
                                            <span className="text-xs bg-slate-100 text-slate-500 font-medium px-2.5 py-1 rounded-lg">
                                                {new Date(entry.date).toLocaleDateString(undefined, { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}
                                            </span>
                                            <div className="flex items-center space-x-2">
                                                <span className="text-xs font-bold text-teal-800 bg-teal-50 border border-teal-100 px-2.5 py-1 rounded-lg">
                                                    Mood: {entry.mood}
                                                </span>
                                                <button 
                                                    onClick={() => deleteJournal(entry.id)}
                                                    className="p-1.5 text-slate-300 hover:text-red-500 transition-colors rounded-lg hover:bg-slate-50"
                                                    title="Delete entry"
                                                >
                                                    <TrashIcon className="w-4 h-4" />
                                                </button>
                                            </div>
                                        </div>
                                        <p className="text-slate-700 text-sm leading-relaxed whitespace-pre-wrap">{entry.text}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // 3. MOOD VIEW COMPONENT
        function MoodTab({ moods, setMoods }) {
            const moodEmotions = [
                { emoji: '😭', label: 'Awful', color: 'bg-rose-50 hover:bg-rose-100 text-rose-700 border-rose-100' },
                { emoji: '😔', label: 'Bad', color: 'bg-amber-50 hover:bg-amber-100 text-amber-700 border-amber-100' },
                { emoji: '😐', label: 'Okay', color: 'bg-slate-100 hover:bg-slate-200 text-slate-700 border-slate-200' },
                { emoji: '🙂', label: 'Good', color: 'bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border-emerald-100' },
                { emoji: '🤩', label: 'Great', color: 'bg-teal-50 hover:bg-teal-100 text-teal-700 border-teal-100' },
            ];

            const logCurrentMood = (item) => {
                const newLog = {
                    id: Date.now(),
                    emoji: item.emoji,
                    label: item.label,
                    date: new Date().toISOString()
                };
                setMoods([newLog, ...moods]);
            };

            return (
                <div className="space-y-6 animate-fade-in">
                    <div>
                        <h2 className="text-3xl font-serif text-teal-950">Daily Mood Tracker</h2>
                        <p className="text-sm text-slate-500">Directly track daily emotional baselines to evaluate therapeutic progression.</p>
                    </div>

                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-slate-100 text-center space-y-6">
                        <h3 className="text-lg font-bold text-slate-800">How are you feeling right now?</h3>
                        <div className="grid grid-cols-2 sm:grid-cols-5 gap-3 max-w-2xl mx-auto">
                            {moodEmotions.map((m, idx) => (
                                <button
                                    key={idx}
                                    onClick={() => logCurrentMood(m)}
                                    className={`flex flex-col items-center p-4 rounded-xl border transition-all duration-200 active:scale-95 ${m.color}`}
                                >
                                    <span className="text-4xl mb-2">{m.emoji}</span>
                                    <span className="text-xs font-semibold">{m.label}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
                        <h3 className="text-md font-bold text-slate-800 mb-4">Mood History & Trends</h3>
                        {moods.length === 0 ? (
                            <p className="text-slate-400 text-sm italic">No records logged yet.</p>
                        ) : (
                            <div className="space-y-3">
                                {moods.map((log) => (
                                    <div key={log.id} className="p-3.5 bg-slate-50 rounded-xl flex items-center justify-between">
                                        <div className="flex items-center space-x-3">
                                            <span className="text-3xl">{log.emoji}</span>
                                            <div>
                                                <p className="text-sm font-bold text-slate-800">{log.label}</p>
                                                <p className="text-xs text-slate-400">Logged on {new Date(log.date).toLocaleDateString()}</p>
                                            </div>
                                        </div>
                                        <span className="text-xs bg-white text-slate-500 border border-slate-200 px-2.5 py-1 rounded-lg">Verified Session State</span>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // 4. DOCUMENTS TAB COMPONENT (INTELLIGENT LOADER/CLASSIFIER)
        function DocumentsTab({ documents, setDocuments, previewDoc, setPreviewDoc, deleteDoc }) {
            const [uploading, setUploading] = useState(false);

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setUploading(true);
                
                const reader = new FileReader();
                reader.onload = (event) => {
                    const textContent = event.target.result;
                    
                    let category = "General Study";
                    if (textContent.toLowerCase().includes("cbt") || textContent.toLowerCase().includes("cognitive") || textContent.toLowerCase().includes("anxiety") || textContent.toLowerCase().includes("breathing") || textContent.toLowerCase().includes("meditation") || textContent.toLowerCase().includes("therapy")) {
                        category = "Mental Health";
                    } else if (textContent.toLowerCase().includes("workout") || textContent.toLowerCase().includes("nutrition") || textContent.toLowerCase().includes("diet") || textContent.toLowerCase().includes("sleep")) {
                        category = "Wellness / Body";
                    }

                    setTimeout(() => {
                        const newDoc = {
                            id: Date.now(),
                            name: file.name,
                            size: (file.size / 1024 / 1024).toFixed(2) + " MB",
                            content: textContent || "This document content is verified. No textual lines loaded.",
                            category: category,
                            date: new Date().toISOString()
                        };

                        setDocuments(prev => [newDoc, ...prev]);
                        setUploading(false);
                    }, 800);
                };

                if (file.name.endsWith('.pdf')) {
                    setTimeout(() => {
                        const mockContent = `SUMMARY DOCUMENT FOR: ${file.name}\n\nKey Concepts in Modern Mental Health:\n- Breathing Exercises: Inhale for 4 seconds, hold for 7 seconds, exhale for 8 seconds.\n- Mood triggers: Document external factors (weather, food, sleep cycles) on negative automatic thoughts.\n- Behavioral Activation: Engaging in small rewarding tasks directly increases dopamine levels and counteracts depressive episodes.`;
                        const newDoc = {
                            id: Date.now(),
                            name: file.name,
                            size: (file.size / 1024 / 1024).toFixed(2) + " MB",
                            content: mockContent,
                            category: "Mental Health",
                            date: new Date().toISOString()
                        };
                        setDocuments(prev => [newDoc, ...prev]);
                        setUploading(false);
                    }, 1200);
                } else {
                    reader.readAsText(file);
                }
            };

            return (
                <div className="space-y-6 animate-fade-in grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <div className="lg:col-span-2 space-y-6">
                        <div>
                            <h2 className="text-3xl font-serif text-teal-950">Knowledge Base</h2>
                            <p className="text-sm text-slate-500">Upload mental health templates, therapist PDFs, worksheets, or guidelines.</p>
                        </div>

                        {/* Drag / Upload Zone */}
                        <label className="flex flex-col items-center justify-center border-2 border-dashed border-slate-200 hover:border-teal-400 bg-white hover:bg-teal-50/20 p-8 rounded-2xl cursor-pointer transition-all duration-200">
                            {uploading ? (
                                <div className="text-center space-y-2 py-4">
                                    <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-teal-600 mx-auto"></div>
                                    <p className="text-sm font-semibold text-teal-800">AI Synthesizing & Classifying...</p>
                                </div>
                            ) : (
                                <div className="text-center space-y-2 py-4">
                                    <div className="bg-teal-50 p-3 rounded-full text-teal-700 inline-block">
                                        <UploadIcon className="w-8 h-8" />
                                    </div>
                                    <p className="text-sm font-semibold text-slate-800">Upload documents or medical worksheets</p>
                                    <p className="text-xs text-slate-400">Supports TXT, PDF, DOCX (Max 10MB)</p>
                                </div>
                            )}
                            <input type="file" className="hidden" onChange={handleFileUpload} accept=".txt,.pdf" />
                        </label>

                        {/* Documents list */}
                        <div className="space-y-3">
                            <h3 className="text-md font-bold text-slate-800">Uploaded Grounded Sources</h3>
                            {documents.length === 0 ? (
                                <p className="text-slate-400 text-sm italic">Your notebook has no customized sources yet.</p>
                            ) : (
                                <div className="space-y-3">
                                    {documents.map(doc => (
                                        <div 
                                            key={doc.id} 
                                            className={`p-4 rounded-xl border flex justify-between items-center transition-all cursor-pointer ${
                                                previewDoc && previewDoc.id === doc.id 
                                                    ? 'bg-teal-50/40 border-teal-300' 
                                                    : 'bg-white border-slate-100 hover:border-slate-300'
                                            }`}
                                            onClick={() => setPreviewDoc(doc)}
                                        >
                                            <div className="flex items-center space-x-3">
                                                <div className="p-2 bg-indigo-50 rounded-lg text-indigo-600">
                                                    <DocsIcon className="w-5 h-5" />
                                                </div>
                                                <div>
                                                    <p className="text-sm font-semibold text-slate-800 max-w-[180px] sm:max-w-xs truncate">{doc.name}</p>
                                                    <div className="flex items-center space-x-2 mt-0.5">
                                                        <span className="text-xs text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded font-medium">
                                                            {doc.category}
                                                        </span>
                                                        <span className="text-xs text-slate-400">{doc.size}</span>
                                                    </div>
                                                </div>
                                            </div>
                                            <button 
                                                onClick={(e) => { e.stopPropagation(); deleteDoc(doc.id); }}
                                                className="p-1.5 text-slate-300 hover:text-red-500 transition-colors"
                                                title="Delete document"
                                            >
                                                <TrashIcon className="w-4 h-4" />
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Interactive Document Preview (Sidebar concept) */}
                    <div className="bg-white p-6 rounded-2xl shadow-sm border border-slate-100 h-fit space-y-4">
                        <h3 className="text-md font-bold text-slate-800 border-b border-slate-100 pb-3 flex items-center justify-between">
                            <span>Source Reader</span>
                            {previewDoc && <span className="text-xs text-slate-400 font-normal">Active</span>}
                        </h3>
                        {previewDoc ? (
                            <div className="space-y-4">
                                <div>
                                    <p className="text-xs font-bold uppercase tracking-wider text-slate-400">File Name</p>
                                    <p className="text-sm font-semibold text-slate-800">{previewDoc.name}</p>
                                </div>
                                <div>
                                    <p className="text-xs font-bold uppercase tracking-wider text-slate-400">Classified Category</p>
                                    <span className="inline-block mt-1 text-xs text-teal-800 bg-teal-50 border border-teal-200 px-2.5 py-1 rounded-lg font-medium">
                                        {previewDoc.category}
                                    </span>
                                </div>
                                <div>
                                    <p className="text-xs font-bold uppercase tracking-wider text-slate-400 mb-1">Content Preview</p>
                                    <div className="bg-slate-50 p-4 rounded-xl text-xs text-slate-600 font-mono leading-relaxed max-h-60 overflow-y-auto whitespace-pre-wrap">
                                        {previewDoc.content}
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <p className="text-sm text-slate-400 italic py-8 text-center">Select an uploaded source to read its contents in this sidebar.</p>
                        )}
                    </div>
                </div>
            );
        }

        // 5. THERAPY CHAT COMPONENT (NotebookLM grounded AI companion)
        function TherapyTab({ journalEntries, documents, moods }) {
            const [input, setInput] = useState("");
            const [chatHistory, setChatHistory] = useState([
                { sender: "ai", text: "Hello! I am your clinical notebook assistant. I synthesize your journal logs and CBT documents to find patterns. Ask me anything, or click on one of the source prompts below.", citedSources: [] }
            ]);
            const [loading, setLoading] = useState(false);

            const quickPrompts = [
                "What coping mechanisms are recommended in my uploaded worksheets?",
                "Analyze my mood logs and tell me if they are improving.",
                "What negative automatic thoughts are showing up in my journals?"
            ];

            const generateGroundedResponse = (userQuery) => {
                setLoading(true);
                
                setTimeout(() => {
                    let textResponse = "I have checked your personal mindmap workspace. ";
                    let sourcesUsed = [];

                    const query = userQuery.toLowerCase();

                    if (query.includes("worksheet") || query.includes("coping") || query.includes("mechanism")) {
                        if (documents.length > 0) {
                            textResponse = `According to your source document [Source: ${documents[0].name}], you should practice identifying negative automatic thoughts. Challenge them by analyzing actual evidence or doing the 4-7-8 deep breathing exercise when facing stress.`;
                            sourcesUsed.push(documents[0].name);
                        } else {
                            textResponse = "I can't find any therapist worksheets uploaded in your Documents. Try uploading a CBT protocol txt file to get custom-grounded therapy responses.";
                        }
                    } else if (query.includes("mood") || query.includes("journal") || query.includes("improving") || query.includes("thoughts")) {
                        if (journalEntries.length > 0) {
                            const totalEntries = journalEntries.length;
                            const lastMood = journalEntries[0].mood;
                            textResponse = `Reviewing your ${totalEntries} journal logs [Source: Recent Journal Timeline], you've exhibited a pattern of self-reflection. Your latest logged mood is "${lastMood}". You frequently reference feeling anxious, but write that organizing tasks and taking smaller steps helps clear your mind.`;
                            sourcesUsed.push("Mental Journal Entries");
                        } else {
                            textResponse = "You haven't logged any journal entries yet. Let me know how you are feeling, or write a quick journal log so I can analyze your thought patterns!";
                        }
                    } else {
                        textResponse = `I analyzed your active mindmap context (which currently holds ${documents.length} sources and ${journalEntries.length} journals). For optimal relief, I highly recommend scheduling at least one structured task today or performing the relaxation exercises mentioned in your uploaded articles.`;
                        if (documents.length > 0) sourcesUsed.push(documents[0].name);
                        if (journalEntries.length > 0) sourcesUsed.push("Personal Journal");
                    }

                    setChatHistory(prev => [...prev, 
                        { sender: "user", text: userQuery },
                        { sender: "ai", text: textResponse, citedSources: sourcesUsed }
                    ]);
                    setLoading(false);
                }, 1000);
            };

            const handleSend = () => {
                if (!input.trim()) return;
                generateGroundedResponse(input);
                setInput("");
            };

            return (
                <div className="space-y-6 animate-fade-in grid grid-cols-1 lg:grid-cols-4 gap-6">
                    
                    {/* Sources Overview Left Sidebar */}
                    <div className="lg:col-span-1 bg-white p-5 rounded-2xl shadow-sm border border-slate-100 h-fit space-y-4">
                        <h3 className="text-sm font-bold text-slate-800 uppercase tracking-wider text-slate-400">Grounded Notebook Context</h3>
                        <div className="space-y-2">
                            <div className="p-3 bg-slate-50 rounded-xl flex items-center justify-between">
                                <span className="text-xs font-semibold text-slate-600">Active Journal logs</span>
                                <span className="text-xs font-bold text-teal-800 bg-teal-100 px-2.5 py-0.5 rounded-full">{journalEntries.length}</span>
                            </div>
                            <div className="p-3 bg-slate-50 rounded-xl flex items-center justify-between">
                                <span className="text-xs font-semibold text-slate-600">Uploaded PDFs/TXTs</span>
                                <span className="text-xs font-bold text-indigo-800 bg-indigo-100 px-2.5 py-0.5 rounded-full">{documents.length}</span>
                            </div>
                        </div>

                        <div className="border-t border-slate-100 pt-4 space-y-2">
                            <h4 className="text-xs font-bold text-slate-400 uppercase tracking-wider">Notebook Sources</h4>
                            {documents.length === 0 ? (
                                <p className="text-xs text-slate-400 italic">No files loaded.</p>
                            ) : (
                                documents.map(d => (
                                    <div key={d.id} className="p-2 bg-indigo-50/50 rounded-lg text-xs font-medium text-indigo-950 truncate">
                                        📄 {d.name}
                                    </div>
                                ))
                            )}
                        </div>
                    </div>

                    {/* Interactive Notebook Chat Area */}
                    <div className="lg:col-span-3 bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-[calc(100vh-14rem)]">
                        <div className="bg-slate-50 px-6 py-4 border-b border-slate-100 flex items-center justify-between">
                            <div className="flex items-center space-x-2">
                                <div className="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></div>
                                <span className="text-xs font-bold text-slate-700">Source-Grounded Therapeutic Engine</span>
                            </div>
                            <span className="text-[10px] text-teal-800 bg-teal-50 px-2.5 py-1 rounded-full border border-teal-100 uppercase tracking-wider font-semibold">NotebookLM Mode</span>
                        </div>

                        {/* Chat history */}
                        <div className="flex-1 overflow-y-auto p-6 space-y-4">
                            {chatHistory.map((msg, idx) => (
                                <div key={idx} className={`flex ${msg.sender === 'user' ? 'justify-end' : 'justify-start'}`}>
                                    <div className={`max-w-[85%] rounded-2xl p-4 text-sm leading-relaxed shadow-sm ${
                                        msg.sender === 'user' 
                                            ? 'bg-teal-700 text-white rounded-tr-none' 
                                            : 'bg-slate-50 text-slate-800 border border-slate-100 rounded-tl-none'
                                    }`}>
                                        <p className="whitespace-pre-wrap">{msg.text}</p>
                                        {msg.citedSources && msg.citedSources.length > 0 && (
                                            <div className="mt-3 pt-2.5 border-t border-slate-200/50 flex flex-wrap gap-1.5 items-center">
                                                <span className="text-[10px] uppercase font-bold text-slate-400 mr-1.5">Sources Cited:</span>
                                                {msg.citedSources.map((source, i) => (
                                                    <span key={i} className="text-[10px] bg-teal-100 text-teal-800 border border-teal-200 px-2 py-0.5 rounded font-semibold">
                                                        🔍 {source}
                                                    </span>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}

                            {loading && (
                                <div className="flex justify-start">
                                    <div className="bg-slate-50 border border-slate-100 rounded-2xl rounded-tl-none p-4 flex items-center space-x-2">
                                        <div className="w-1.5 h-1.5 bg-slate-500 rounded-full animate-bounce" style={{ animationDelay: '0s' }}></div>
                                        <div className="w-1.5 h-1.5 bg-slate-500 rounded-full animate-bounce" style={{ animationDelay: '0.2s' }}></div>
                                        <div className="w-1.5 h-1.5 bg-slate-500 rounded-full animate-bounce" style={{ animationDelay: '0.4s' }}></div>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* Prompt helper chips */}
                        {chatHistory.length < 3 && (
                            <div className="px-6 py-2 border-t border-slate-100 flex flex-wrap gap-2">
                                {quickPrompts.map((qp, idx) => (
                                    <button 
                                        key={idx} 
                                        onClick={() => generateGroundedResponse(qp)}
                                        className="text-xs text-slate-600 bg-slate-50 hover:bg-slate-100 hover:text-teal-950 border border-slate-200 px-3 py-2 rounded-xl text-left transition-all"
                                    >
                                        {qp}
                                    </button>
                                ))}
                            </div>
                        )}

                        {/* Message input */}
                        <div className="p-4 border-t border-slate-100 flex items-center space-x-2">
                            <input 
                                type="text"
                                value={input}
                                onChange={(e) => setInput(e.target.value)}
                                onKeyDown={(e) => e.key === 'Enter' && handleSend()}
                                placeholder="Search details or ask therapist advice based on uploaded worksheets..."
                                className="flex-1 bg-slate-100 border border-slate-100 rounded-xl px-4 py-3 outline-none focus:bg-white focus:border-teal-500/30 text-sm"
                            />
                            <button 
                                onClick={handleSend}
                                className="p-3 bg-teal-700 hover:bg-teal-800 text-white rounded-xl transition-colors shadow-sm"
                            >
                                <SendIcon className="w-5 h-5" />
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- Main App Component ---
        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            
            // App state management
            const [journalEntries, setJournalEntries] = useLocalStorage('mindmap_journals_v2', [
                { id: 1, text: "Felt quite anxious today about work tasks, but writing things down helped put them in perspective.", mood: "Bad", date: new Date(Date.now() - 86400000).toISOString() },
                { id: 2, text: "Slept better last night. Enjoyed a warm cup of chamomile tea. Taking smaller steps.", mood: "Good", date: new Date().toISOString() }
            ]);
            const [moods, setMoods] = useLocalStorage('mindmap_moods_v2', [
                { id: 1, emoji: '😔', label: 'Bad', date: new Date(Date.now() - 86400000).toISOString() },
                { id: 2, emoji: '🙂', label: 'Good', date: new Date().toISOString() }
            ]);
            const [documents, setDocuments] = useLocalStorage('mindmap_docs_v2', [
                { 
                    id: 1, 
                    name: "Anxiety CBT Protocol.txt", 
                    size: "0.2 MB", 
                    date: new Date().toISOString(), 
                    category: "Mental Health",
                    content: "Cognitive Behavioral Therapy (CBT) recommends identifying negative automatic thoughts. Challenge these thoughts by examining the evidence: Is this thought fully true? What is an alternative explanation? Practice 4-7-8 breathing when anxiety spikes."
                }
            ]);
            const [streak, setStreak] = useLocalStorage('mindmap_streak_v2', 3);
            const [lastActive, setLastActive] = useLocalStorage('mindmap_lastActive_v2', new Date().toDateString());
            
            // Sidebar document previewer state
            const [previewDoc, setPreviewDoc] = useState(null);

            // Streak check on load
            useEffect(() => {
                const today = new Date().toDateString();
                if (lastActive !== today) {
                    const yesterday = new Date();
                    yesterday.setDate(yesterday.getDate() - 1);
                    if (lastActive === yesterday.toDateString()) {
                        setStreak(prev => prev + 1);
                    } else if (lastActive !== today) {
                        setStreak(1);
                    }
                    setLastActive(today);
                }
            }, [lastActive]);

            // Delete Helpers passed as props
            const deleteJournal = (id) => {
                setJournalEntries(prev => prev.filter(entry => entry.id !== id));
            };
            const deleteDoc = (id) => {
                setDocuments(prev => prev.filter(doc => doc.id !== id));
                if (previewDoc && previewDoc.id === id) setPreviewDoc(null);
            };

            return (
                <div className="min-h-screen bg-[#F8FAFC] flex flex-col md:flex-row font-sans">
                     {/* Sidebar menu panel */}
                     <aside className="w-full md:w-64 bg-white border-r border-slate-200 px-4 py-6 flex flex-col shrink-0">
                        <div className="flex items-center space-x-3 px-2 mb-8">
                            <div className="bg-teal-700 p-2.5 rounded-xl text-white shadow-md">
                                <BrainIcon className="w-6 h-6" />
                            </div>
                            <div>
                                <h1 className="text-xl font-bold font-serif text-teal-950 tracking-tight">MindMap</h1>
                                <p className="text-[10px] text-emerald-600 font-bold uppercase tracking-wider">Notebook LM</p>
                            </div>
                        </div>
                        
                        <nav className="space-y-1.5 flex-1">
                            <NavItem Icon={DashboardIcon} label="Dashboard" active={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                            <NavItem Icon={JournalIcon} label="Journal" active={activeTab === 'journal'} onClick={() => setActiveTab('journal')} />
                            <NavItem Icon={MoodIcon} label="Mood tracker" active={activeTab === 'mood'} onClick={() => { setActiveTab('mood'); }} />
                            <NavItem Icon={DocsIcon} label="Documents" active={activeTab === 'documents'} onClick={() => setActiveTab('documents')} />
                            <NavItem Icon={ChatIcon} label="Therapy Guide" active={activeTab === 'therapy'} onClick={() => setActiveTab('therapy')} />
                        </nav>

                        <div className="mt-auto p-4 bg-teal-50/60 border border-teal-100 rounded-2xl">
                            <p className="text-xs text-teal-900 leading-relaxed font-light text-center">
                                "Self-reflection is the portal to inner peace."
                            </p>
                        </div>
                     </aside>

                     {/* Main Page Routing via Standalone Components */}
                     <main className="flex-1 p-6 md:p-10 overflow-y-auto h-screen">
                        <div className="max-w-5xl mx-auto h-full text-slate-800">
                             {activeTab === 'dashboard' && (
                                <DashboardTab 
                                    journalEntries={journalEntries}
                                    moods={moods}
                                    documents={documents}
                                    streak={streak}
                                    setActiveTab={setActiveTab}
                                    setPreviewDoc={setPreviewDoc}
                                />
                             )}
                             {activeTab === 'journal' && (
                                <JournalTab 
                                    journalEntries={journalEntries}
                                    setJournalEntries={setJournalEntries}
                                    moods={moods}
                                    setMoods={setMoods}
                                    deleteJournal={deleteJournal}
                                />
                             )}
                             {activeTab === 'mood' && (
                                <MoodTab 
                                    moods={moods}
                                    setMoods={setMoods}
                                />
                             )}
                             {activeTab === 'documents' && (
                                <DocumentsTab 
                                    documents={documents}
                                    setDocuments={setDocuments}
                                    previewDoc={previewDoc}
                                    setPreviewDoc={setPreviewDoc}
                                    deleteDoc={deleteDoc}
                                />
                             )}
                             {activeTab === 'therapy' && (
                                <TherapyTab 
                                    journalEntries={journalEntries}
                                    documents={documents}
                                    moods={moods}
                                />
                             )}
                        </div>
                     </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
